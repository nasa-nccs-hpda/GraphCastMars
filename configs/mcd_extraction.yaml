# configs/mcd_extraction.yaml

data_location: /discover/nobackup/jli30/systest/MCD_6.1/data/
data_version: '6.1'
output_path: /discover/nobackup/projects/nccs_interns/mvu2/jli/data/hrkey0

# Query parameters
zkey: 3
hrkey: 0

# Time ranges
ls_range: [0, 361, 5]
lct_range: [0, 24, 6]
mars_year: 37

# Mars physical constants
mars_gravity: 3.71
mars_gas_constant: 188.9
mars_radius: 3389500.0

# Vertical coordinates (heights in meters, descending)
vertical_heights: [32030, 24620, 20280, 17210, 14820, 12870, 9800, 7410, 5460, 3810, 1740, 830, 50]
pressure_levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]

# 2D Variables
variables_2d:
  - var_id: 93
    name: '2m_temperature'
    xz_level: 2
    description: '2m temperature'
  - var_id: 15
    name: 'mean_sea_level_pressure'
    xz_level: 1
    description: 'Mean sea level pressure'
  # ... add more as needed

# 3D Variables
variables_3d:
  - var_id: 93
    name: 'temperature'
    description: 'Temperature profile'
  - var_id: 17
    name: 'geopotential'
    description: 'Geopotential'
  # ... add more

# Processing options
pressure_scaling: 300.0
geopotential_scaling: 75000.0
include_precipitation: true
include_land_sea_mask: true

# Mars year reference
mars_year_reference_date: "1955-04-11"
mars_year_days: 686.97

netcdf_format: NETCDF4